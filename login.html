<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PostPal Academy</title>
    <meta name="description" content="Log in to your PostPal Academy account.">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo">PostPal</a>
            
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="academy.html">Academy</a>
                <a href="join.html">Join</a>
                <a href="login.html" class="nav-login active">Login</a>
            </div>
            
            <button class="nav-hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        
        <div class="nav-mobile">
            <a href="index.html">Home</a>
            <a href="academy.html">Academy</a>
            <a href="join.html">Join</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main>
        <div class="login-container">
            <div class="login-card">
                <h1>Welcome back</h1>
                
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" disabled>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" disabled>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block" disabled>Log in</button>
                </form>
                
                <div class="login-notice">
                    <p>🔒 Login will be enabled soon.</p>
                    <p style="margin-top: 0.5rem;">We're finishing up the member portal. Check back shortly!</p>
                </div>
                
                <p class="text-center mt-lg">
                    <span class="text-muted">Don't have an account?</span>
                    <a href="join.html">Join PostPal</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-logo">PostPal Academy</div>
            <div class="footer-links">
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
            </div>
            <div class="footer-copy">© 2025 PostPal. All rights reserved.</div>
        </div>
    </footer>

    <script src="assets/app.js"></script>
</body>
</html>
